{# wizard_nav.html — Back / Save Draft / Next, shared across creation steps. #}
<div class="flex items-center justify-between mt-8 gap-2 flex-wrap">
  <button type="button" @click="goStep(step - 1)"
          class="btn-ghost font-cinzel tracking-widest text-xs flex items-center gap-2">
    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="square" d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </button>
  <div class="flex items-center gap-2">
    <button type="button" @click="saveAsDraft($event)"
            class="btn-ghost font-cinzel tracking-widest text-xs">
      Save Draft
    </button>
    <button type="button" @click="canLeaveStep() && goStep(step + 1)"
            :disabled="!canLeaveStep()"
            :title="canLeaveStep() ? '' : 'Resolve the over-budget items (shown in red) to continue.'"
            :class="canLeaveStep() ? 'btn-send' : 'btn-ghost opacity-60 cursor-not-allowed'"
            class="font-cinzel tracking-widest text-xs flex items-center gap-2">
      Next
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="square" d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</div>
