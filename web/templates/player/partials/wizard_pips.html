{# wizard_pips.html — 5-dot clickable pip selector for a single trait.
   Caller must set `tplkey` to the trait key (e.g. 'attr_strength'). #}
<div class="flex gap-0.5">
  {% for n in range(1, 6) %}
  <button type="button"
          @click="togglePip('{{ tplkey }}', {{ n }})"
          class="w-3 h-3 rounded-full border transition-colors"
          :class="(sheet['{{ tplkey }}'] || 0) >= {{ n }}
            ? 'bg-gold-500 border-gold-400'
            : 'border-bone-700 hover:border-bone-500'"></button>
  {% endfor %}
</div>
